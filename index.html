<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cybersecurity Network Apprentice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
  height: 100%;
}
body {
  background: #000;
  font-family: 'Inter', sans-serif;
  height: 100%;
}

/* ── Sections ── */
.section {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  scroll-snap-align: start;
}

/* ── Shared typography ── */
.headline {
  font-family: 'Inter', sans-serif;
  font-size: 58px;
  font-weight: 700;
  line-height: 1.05;
  color: #fff;
  margin-bottom: 18px;
  letter-spacing: -1.5px;
  text-transform: uppercase;
}
.sub {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,0.38);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  margin-bottom: 36px;
}
.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #fff;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.35);
  padding: 14px 28px;
  cursor: pointer;
  text-decoration: none;
  position: relative;
  overflow: hidden;
  transition: border-color 0.3s ease, color 0.3s ease;
}
.cta-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.05);
  opacity: 0;
  transition: opacity 0.3s ease;
}
.cta-btn:hover { border-color: rgba(100,170,255,0.7); color: rgba(140,195,255,1); }
.cta-btn:hover::before { opacity: 1; }
.cta-arrow { font-size: 14px; transition: transform 0.3s ease; display: inline-block; }
.cta-btn:hover .cta-arrow { transform: translateX(5px); }

/* ── Stars ── */
.stars {
  position: absolute;
  inset: 0;
  background-image:
    radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 15% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 5%  50%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 55%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 32% 88%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 78% 90%, rgba(255,255,255,0.4) 0%, transparent 100%);
  pointer-events: none;
}
.vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 30% 50%, transparent 20%, rgba(0,0,0,0.3) 70%);
  pointer-events: none;
}

/* ── Section 1: Hero ── */
.sphere-center {
  position: absolute;
  right: -60px;
  top: 50%;
  transform: translateY(-50%);
  width: 680px;
  height: 680px;
}
.sphere-center > * {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
}
.glow-layer-1 {
  width: 680px; height: 680px; border-radius: 50%;
  background: radial-gradient(circle at 50% 50%, rgba(30,120,255,0.22) 0%, rgba(20,80,200,0.12) 30%, rgba(10,40,140,0.06) 55%, transparent 75%);
  animation: pulseGlow 4s ease-in-out infinite alternate;
}
.glow-layer-2 {
  width: 560px; height: 560px; border-radius: 50%;
  background: radial-gradient(circle at 50% 50%, rgba(80,160,255,0.28) 0%, rgba(50,120,240,0.15) 40%, transparent 70%);
  animation: pulseGlow 4s ease-in-out infinite alternate-reverse;
}
.glow-layer-3 {
  width: 440px; height: 440px; border-radius: 50%;
  background: radial-gradient(circle at 50% 50%, rgba(120,190,255,0.35) 0%, rgba(80,150,255,0.18) 35%, transparent 65%);
  animation: pulseGlow2 3.5s ease-in-out infinite alternate;
}
.halo-ring {
  width: 680px; height: 680px; border-radius: 50%;
  border: 1px solid rgba(60,140,255,0.08);
  box-shadow: 0 0 60px 30px rgba(30,100,220,0.07), 0 0 120px 60px rgba(20,70,180,0.04), inset 0 0 80px rgba(40,120,255,0.04);
  animation: haloPulse 5s ease-in-out infinite alternate;
}
.halo-ring-2 {
  width: 540px; height: 540px; border-radius: 50%;
  border: 0.5px solid rgba(80,160,255,0.06);
  animation: haloPulse 5s ease-in-out infinite alternate-reverse;
}
.rays { width: 400px; height: 400px; opacity: 0.15; animation: rayRotate 20s linear infinite; }
.shield-wrap { width: 320px; height: 360px; display: flex; align-items: center; justify-content: center; }
.shield-svg {
  width: 320px; height: 360px;
  animation: shieldFloat 6s ease-in-out infinite alternate, shieldGlow 4s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 40px rgba(60,140,255,0.7)) drop-shadow(0 0 80px rgba(40,100,220,0.4)) drop-shadow(0 0 140px rgba(30,80,200,0.25));
}
.hero-content {
  position: absolute;
  left: 8%; top: 50%;
  transform: translateY(-50%);
  max-width: 520px;
  z-index: 10;
}

/* ── Section 2: Companies ── */
.companies-scene {
  position: absolute;
  left: 0; top: 0;
  width: 57%;
  height: 100%;
}
.companies-scene svg { width: 100%; height: 100%; }
.companies-content {
  position: absolute;
  right: 8%; top: 50%;
  transform: translateY(-50%);
  max-width: 420px;
  z-index: 10;
}

/* ── LED animations ── */
@keyframes ledGreen {
  0%,40%,100%{opacity:1;}
  45%,95%{opacity:0.08;}
}
@keyframes ledAmber {
  0%,100%{opacity:0.12;}
  8%,20%{opacity:1;}
  22%,52%{opacity:0.18;}
  58%,76%{opacity:0.95;}
  80%{opacity:0.12;}
}
@keyframes ledBlue {
  0%,100%{opacity:0.85;}
  50%{opacity:0.25;}
}
@keyframes portGreen {
  0%,8%,100%{opacity:0.95;}
  4%{opacity:0.05;}
  30%,55%{opacity:1;}
  42%{opacity:0.05;}
}
@keyframes portAmber {
  0%,100%{opacity:0.08;}
  12%,24%{opacity:1;}
  48%,62%{opacity:0.85;}
}

.lp { animation: ledGreen 2s ease-in-out infinite; fill:#00ff44; }
.la { animation: ledAmber 0.45s linear infinite; fill:#ffaa00; }
.ln { animation: ledBlue 2.8s ease-in-out infinite; fill:#3399ff; }
.pg { animation: portGreen 0.9s linear infinite; fill:#00cc33; }
.pa { animation: portAmber 0.38s linear infinite; fill:#ffaa00; }

/* ── Global keyframes ── */
@keyframes pulseGlow { from{opacity:0.7;transform:scale(0.97);}to{opacity:1;transform:scale(1.03);} }
@keyframes pulseGlow2 { from{opacity:0.6;transform:scale(0.95);}to{opacity:1;transform:scale(1.05);} }
@keyframes haloPulse { from{opacity:0.6;}to{opacity:1;} }
@keyframes rayRotate { from{transform:translateY(-50%) rotate(0deg);}to{transform:translateY(-50%) rotate(360deg);} }
@keyframes shieldFloat { from{transform:translateY(-8px);}to{transform:translateY(8px);} }
@keyframes shieldGlow {
  from{filter:drop-shadow(0 0 30px rgba(60,140,255,0.6)) drop-shadow(0 0 70px rgba(40,100,220,0.35)) drop-shadow(0 0 120px rgba(30,80,200,0.2));}
  to{filter:drop-shadow(0 0 50px rgba(80,160,255,0.85)) drop-shadow(0 0 100px rgba(60,130,240,0.5)) drop-shadow(0 0 180px rgba(40,100,220,0.35));}
}
@keyframes diskPulse {
  0%,100%{opacity:0.88;}
  50%{opacity:1;}
}
</style>
</head>
<body>

<!-- ════════════════════════════════════
     SECTION 1 — HERO
════════════════════════════════════ -->
<section class="section">
  <div class="stars"></div>
  <div class="sphere-center">
    <div class="glow-layer-1"></div>
    <div class="glow-layer-2"></div>
    <div class="glow-layer-3"></div>
    <div class="halo-ring"></div>
    <div class="halo-ring-2"></div>
    <div class="rays">
      <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" width="400" height="400">
        <defs>
          <radialGradient id="rayGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="rgba(60,130,255,0.25)"/>
            <stop offset="100%" stop-color="rgba(60,130,255,0)"/>
          </radialGradient>
        </defs>
        <g transform="translate(200,200)" fill="url(#rayGrad)" opacity="0.5">
          <polygon points="0,-200 8,-30 -8,-30"/>
          <polygon points="0,-200 8,-30 -8,-30" transform="rotate(30)"/>
          <polygon points="0,-200 8,-30 -8,-30" transform="rotate(60)"/>
          <polygon points="0,-200 8,-30 -8,-30" transform="rotate(90)"/>
          <polygon points="0,-200 8,-30 -8,-30" transform="rotate(120)"/>
          <polygon points="0,-200 8,-30 -8,-30" transform="rotate(150)"/>
          <polygon points="0,-200 8,-30 -8,-30" transform="rotate(180)"/>
          <polygon points="0,-200 8,-30 -8,-30" transform="rotate(210)"/>
          <polygon points="0,-200 8,-30 -8,-30" transform="rotate(240)"/>
          <polygon points="0,-200 8,-30 -8,-30" transform="rotate(270)"/>
          <polygon points="0,-200 8,-30 -8,-30" transform="rotate(300)"/>
          <polygon points="0,-200 8,-30 -8,-30" transform="rotate(330)"/>
        </g>
      </svg>
    </div>
    <div class="shield-wrap">
      <svg class="shield-svg" viewBox="0 0 200 230" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="shieldBody" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5aabff"/>
            <stop offset="50%" stop-color="#1a6fd4"/>
            <stop offset="100%" stop-color="#0b3d8c"/>
          </linearGradient>
          <linearGradient id="shieldEdge" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#90ccff"/>
            <stop offset="100%" stop-color="#2260c4"/>
          </linearGradient>
          <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#c8e8ff"/>
            <stop offset="100%" stop-color="#78b8ff"/>
          </linearGradient>
        </defs>
        <path d="M100 8 L182 40 L182 110 Q182 178 100 218 Q18 178 18 110 L18 40 Z" fill="none" stroke="url(#shieldEdge)" stroke-width="3" opacity="0.85"/>
        <path d="M100 14 L176 44 L176 110 Q176 172 100 210 Q24 172 24 110 L24 44 Z" fill="url(#shieldBody)" opacity="0.92"/>
        <path d="M100 14 L176 44 L176 110 Q176 172 100 210 Q24 172 24 110 L24 44 Z" fill="none" stroke="rgba(180,220,255,0.35)" stroke-width="1.5"/>
        <ellipse cx="80" cy="70" rx="30" ry="18" fill="rgba(200,235,255,0.12)" transform="rotate(-20,80,70)"/>
        <rect x="76" y="118" width="48" height="36" rx="6" fill="url(#lockGrad)" opacity="0.95"/>
        <path d="M86 118 L86 104 Q86 90 100 90 Q114 90 114 104 L114 118" fill="none" stroke="url(#lockGrad)" stroke-width="10" stroke-linecap="round"/>
        <path d="M86 118 L86 104 Q86 90 100 90 Q114 90 114 104 L114 118" fill="none" stroke="rgba(180,220,255,0.5)" stroke-width="5" stroke-linecap="round"/>
        <circle cx="100" cy="132" r="5" fill="rgba(10,50,130,0.8)"/>
        <rect x="97.5" y="132" width="5" height="9" rx="2" fill="rgba(10,50,130,0.8)"/>
        <rect x="76" y="118" width="48" height="10" rx="6" fill="rgba(200,235,255,0.2)"/>
      </svg>
    </div>
  </div>
  <div class="hero-content">
    <h1 class="headline">CYBERSECURITY<br>NETWORK<br>APPRENTICE</h1>
    <p class="sub">Discover · Learn · Protect</p>
    <a href="#companies" class="cta-btn">Discover <span class="cta-arrow">→</span></a>
  </div>
  <div class="vignette"></div>
</section>

<!-- ════════════════════════════════════
     SECTION 2 — COMPANIES / BLACK HOLE
════════════════════════════════════ -->
<section class="section" id="companies">
  <div class="stars"></div>

  <!-- ── Scene: Black hole + Server rack ── -->
  <div class="companies-scene">
    <svg viewBox="0 0 960 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
      <defs>

        <!-- Ambient warm orange/red glow behind BH -->
        <radialGradient id="bhAmb" cx="340" cy="510" r="400" gradientUnits="userSpaceOnUse">
          <stop offset="0%"   stop-color="#ff5500" stop-opacity="0.14"/>
          <stop offset="35%"  stop-color="#cc3300" stop-opacity="0.07"/>
          <stop offset="75%"  stop-color="#551100" stop-opacity="0.02"/>
          <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
        </radialGradient>

        <!-- Disk glow filters -->
        <filter id="dg1" x="-60%" y="-60%" width="220%" height="220%">
          <feGaussianBlur stdDeviation="9" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="dg2" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur stdDeviation="18" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="photonF" x="-120%" y="-120%" width="340%" height="340%">
          <feGaussianBlur stdDeviation="5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <!-- Clip: far side of disk (upper = behind void) -->
        <clipPath id="diskFar">
          <rect x="0" y="0" width="960" height="513"/>
        </clipPath>
        <!-- Clip: near side of disk (lower = in front of void) -->
        <clipPath id="diskNear">
          <rect x="0" y="513" width="960" height="567"/>
        </clipPath>

      </defs>

      <!-- ══ LAYER 1 — Ambient glow ══ -->
      <circle cx="340" cy="510" r="440" fill="url(#bhAmb)"/>
      <!-- Secondary warm pool (near side, brighter) -->
      <ellipse cx="330" cy="640" rx="260" ry="160" fill="rgba(160,50,0,0.055)"/>

      <!-- ══ LAYER 2 — FAR accretion disk (behind rack + void) ══ -->
      <g clip-path="url(#diskFar)" style="animation:diskPulse 5s ease-in-out infinite;">
        <ellipse cx="340" cy="513" rx="375" ry="82" fill="none" stroke="#550f00" stroke-width="5"  opacity="0.35"/>
        <ellipse cx="340" cy="513" rx="335" ry="73" fill="none" stroke="#993000" stroke-width="9"  opacity="0.45" filter="url(#dg1)"/>
        <ellipse cx="340" cy="513" rx="278" ry="61" fill="none" stroke="#dd5200" stroke-width="14" opacity="0.55" filter="url(#dg1)"/>
        <ellipse cx="340" cy="513" rx="222" ry="49" fill="none" stroke="#ffaa30" stroke-width="17" opacity="0.62" filter="url(#dg2)"/>
        <ellipse cx="340" cy="513" rx="178" ry="39" fill="none" stroke="#fff0aa" stroke-width="9"  opacity="0.50" filter="url(#dg1)"/>
      </g>

      <!-- ══ LAYER 3 — SERVER RACK (rotate 35° clockwise around top-centre) ══ -->
      <!--
        Pivot: (580, 130) = top-centre of rack frame
        Rack frame: x 535→627, y 130→620  (w=92, h=490)
        After rotate(35°): bottom-centre lands near (300, 530) ≈ BH centre
        Bottom 1/3 (≈163px) is inside the void and gets covered
      -->
      <g transform="rotate(35, 580, 130)">

        <!-- Rack outer shell -->
        <rect x="535" y="130" width="92" height="500" fill="#0c0c0c" stroke="#202020" stroke-width="1.5" rx="2"/>
        <!-- Left post -->
        <rect x="535" y="130" width="10" height="500" fill="#161616" stroke="#2b2b2b" stroke-width="0.5"/>
        <!-- Right post -->
        <rect x="617" y="130" width="10" height="500" fill="#161616" stroke="#2b2b2b" stroke-width="0.5"/>
        <!-- U-slot tick marks on left post -->
        <line x1="538" y1="152" x2="542" y2="152" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="163" x2="542" y2="163" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="174" x2="542" y2="174" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="185" x2="542" y2="185" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="196" x2="542" y2="196" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="207" x2="542" y2="207" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="218" x2="542" y2="218" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="229" x2="542" y2="229" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="240" x2="542" y2="240" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="251" x2="542" y2="251" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="262" x2="542" y2="262" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="273" x2="542" y2="273" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="284" x2="542" y2="284" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="295" x2="542" y2="295" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="306" x2="542" y2="306" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="317" x2="542" y2="317" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="328" x2="542" y2="328" stroke="#313131" stroke-width="0.5"/>
        <line x1="538" y1="339" x2="542" y2="339" stroke="#313131" stroke-width="0.5"/>
        <!-- Top cap -->
        <rect x="545" y="130" width="72" height="10" fill="#131313" stroke="#202020" stroke-width="0.4"/>

        <!-- Patch cables exiting top -->
        <path d="M558,130 C556,112 550,104 553,90" fill="none" stroke="#0044cc" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
        <path d="M565,130 C563,114 560,107 562,94" fill="none" stroke="#cc4400" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
        <path d="M572,130 C573,116 577,110 574,98" fill="none" stroke="#555"    stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
        <path d="M579,130 C580,114 585,108 582,96" fill="none" stroke="#aaaa00" stroke-width="3"   stroke-linecap="round" opacity="0.8"/>
        <path d="M586,130 C588,112 594,107 591,95" fill="none" stroke="#009944" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
        <path d="M593,130 C595,111 601,106 598,94" fill="none" stroke="#990055" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

        <!-- ── 1U Blank (141) ── -->
        <rect x="545" y="141" width="72" height="10" fill="#090909" stroke="#181818" stroke-width="0.3"/>

        <!-- ── 2U Server A (152) ── -->
        <rect x="545" y="152" width="72" height="21" fill="#141414" stroke="#222" stroke-width="0.5" rx="1"/>
        <rect x="546" y="153" width="70" height="19" fill="#1b1b1b" rx="0.5"/>
        <rect x="548" y="155" width="26" height="6" fill="#101010" rx="0.3"/>
        <rect x="548" y="163" width="12" height="7" fill="#0b0b0b" stroke="#202020" stroke-width="0.3" rx="0.5"/>
        <rect x="561" y="163" width="12" height="7" fill="#0b0b0b" stroke="#202020" stroke-width="0.3" rx="0.5"/>
        <rect x="574" y="163" width="12" height="7" fill="#0b0b0b" stroke="#202020" stroke-width="0.3" rx="0.5"/>
        <circle cx="601" cy="156" r="1.3" class="lp" style="animation-delay:0s"/>
        <circle cx="606" cy="156" r="1.3" class="la" style="animation-delay:0.15s"/>
        <circle cx="611" cy="156" r="1.3" class="ln" style="animation-delay:0.5s"/>
        <circle cx="613" cy="165" r="2"   fill="#181818" stroke="#333" stroke-width="0.4"/>
        <rect   x="599" y="163" width="5" height="3" fill="#090909" stroke="#222" stroke-width="0.3" rx="0.2"/>

        <!-- ── 2U Server B (174) ── -->
        <rect x="545" y="174" width="72" height="21" fill="#141414" stroke="#222" stroke-width="0.5" rx="1"/>
        <rect x="546" y="175" width="70" height="19" fill="#1a1a1a" rx="0.5"/>
        <rect x="548" y="177" width="26" height="6" fill="#101010" rx="0.3"/>
        <rect x="548" y="185" width="12" height="7" fill="#0b0b0b" stroke="#202020" stroke-width="0.3" rx="0.5"/>
        <rect x="561" y="185" width="12" height="7" fill="#0b0b0b" stroke="#202020" stroke-width="0.3" rx="0.5"/>
        <circle cx="601" cy="178" r="1.3" class="lp" style="animation-delay:0.7s"/>
        <circle cx="606" cy="178" r="1.3" class="la" style="animation-delay:0.3s"/>
        <circle cx="611" cy="178" r="1.3" class="ln" style="animation-delay:1.1s"/>
        <circle cx="613" cy="187" r="2"   fill="#181818" stroke="#333" stroke-width="0.4"/>
